<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Furniture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #f39c12;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7') no-repeat center/cover;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h2 {
            font-size: 48px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
        }

        .products {
            padding: 50px;
            text-align: center;
        }

        .products h2 {
            margin-bottom: 30px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 15px 0;
        }

        .card p {
            color: #777;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background: #f39c12;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .card button:hover {
            background: #e67e22;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>Luxury Furniture</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Elegant Furniture for Modern Living</h2>
</section>

<section class="products">
    <h2>Our Collection</h2>
    <div class="product-grid">
        
        <div class="card">
            <img src="https://images.unsplash.com/photo-1616627450485-87f7a0a9c89e" alt="Sofa">
            <h3>Modern Sofa</h3>
            <p>$499</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85" alt="Chair">
            <h3>Wooden Chair</h3>
            <p>$149</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1582582429416-1c9d4c1a67c7" alt="Table">
            <h3>Dining Table</h3>
            <p>$799</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598300053643-5c01d5d9a7f5" alt="Bed">
            <h3>Luxury Bed</h3>
            <p>$999</p>
            <button>Buy Now</button>
        </div>

    </div>
</section>

<footer>
    <p>&copy; 2026 Luxury Furniture. All rights reserved.</p>
</footer>

</body>
</html>
